  #     db:
  #       condition: service_healthy
  #   environment:
  #     DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-spp}:${POSTGRES_PASSWORD:-spp_secret}@db:5432/${POSTGRES_DB:-spp}
  #   volumes:
  #     - ./data_lab:/app/data_lab

volumes:
  pgdata:
